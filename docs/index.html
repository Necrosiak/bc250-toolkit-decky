<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC250 Toolkit — Submit a Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #12122a;
      border-bottom: 2px solid #e44d26;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header img { height: 40px; }
    header h1 { font-size: 1.4rem; color: #fff; }
    header h1 span { color: #e44d26; }

    .lang-bar {
      background: #12122a;
      padding: 8px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #222244;
    }
    .lang-bar button {
      background: none;
      border: 1px solid #333366;
      color: #aaa;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .lang-bar button:hover, .lang-bar button.active {
      background: #e44d26;
      border-color: #e44d26;
      color: #fff;
    }

    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 32px auto;
      padding: 0 16px;
    }

    .intro {
      background: #12122a;
      border: 1px solid #222244;
      border-left: 3px solid #e44d26;
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-bottom: 28px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .intro a { color: #e44d26; text-decoration: none; }
    .intro a:hover { text-decoration: underline; }

    form { display: flex; flex-direction: column; gap: 20px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
    }
    label .req { color: #e44d26; margin-left: 2px; }
    .hint {
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
    }
    .hint a { color: #e44d26; text-decoration: none; }

    input[type="text"], textarea, select {
      background: #12122a;
      border: 1px solid #333366;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      width: 100%;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #e44d26;
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #12122a; }

    .submit-btn {
      background: #e44d26;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      align-self: flex-start;
    }
    .submit-btn:hover { background: #c43a1c; }
    .submit-btn:active { transform: scale(0.98); }

    .error { color: #ff6b6b; font-size: 0.82rem; display: none; }
    .field.invalid .error { display: block; }
    .field.invalid input, .field.invalid textarea, .field.invalid select {
      border-color: #ff6b6b;
    }

    footer {
      background: #0a0a15;
      border-top: 1px solid #222244;
      padding: 16px 24px;
      text-align: center;
      font-size: 0.82rem;
      color: #555;
    }
    footer a { color: #e44d26; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>BC250 <span>Toolkit</span></h1>
  </div>
</header>

<div class="lang-bar" id="langBar"></div>

<main>
  <div class="intro" id="introText"></div>

  <form id="gameForm" novalidate>
    <div class="field" id="f-name">
      <label for="gameName"><span data-i18n="label_name"></span><span class="req">*</span></label>
      <input type="text" id="gameName" autocomplete="off" />
      <div class="error" data-i18n="err_required"></div>
    </div>

    <div class="field" id="f-appid">
      <label for="appId"><span data-i18n="label_appid"></span><span class="req">*</span></label>
      <input type="text" id="appId" autocomplete="off" inputmode="numeric" />
      <div class="hint"><span data-i18n="hint_appid"></span> <a href="https://store.steampowered.com" target="_blank" rel="noopener">store.steampowered.com/app/<strong>XXXXXX</strong>/</a></div>
      <div class="error" id="appIdError"></div>
    </div>

    <div class="field" id="f-proton">
      <label for="proton"><span data-i18n="label_proton"></span><span class="req">*</span></label>
      <select id="proton">
        <option value="GE-Proton (latest)">GE-Proton (latest)</option>
        <option value="Proton Experimental">Proton Experimental</option>
        <option value="Proton Stable">Proton Stable</option>
        <option value="Other (specify in notes)">Other (specify in notes)</option>
      </select>
      <div class="error" data-i18n="err_required"></div>
    </div>

    <div class="field" id="f-compat">
      <label for="compatTool"><span data-i18n="label_compat"></span></label>
      <input type="text" id="compatTool" placeholder="proton_ge / proton_experimental" autocomplete="off" />
      <div class="hint" data-i18n="hint_compat"></div>
    </div>

    <div class="field" id="f-launch">
      <label for="launchOpts"><span data-i18n="label_launch"></span></label>
      <textarea id="launchOpts" rows="3" placeholder="MANGOHUD=1 MANGOHUD_CONFIG=no_display ENABLE_VKBASALT=1 gamemoderun %command%"></textarea>
    </div>

    <div class="field" id="f-notes">
      <label for="notes"><span data-i18n="label_notes"></span><span class="req">*</span></label>
      <textarea id="notes" rows="4"></textarea>
      <div class="hint" data-i18n="hint_notes"></div>
      <div class="error" data-i18n="err_required"></div>
    </div>

    <div class="field" id="f-tested">
      <label for="testedBy"><span data-i18n="label_tested"></span></label>
      <input type="text" id="testedBy" autocomplete="off" />
      <div class="hint" data-i18n="hint_tested"></div>
    </div>

    <button type="submit" class="submit-btn" data-i18n="btn_submit"></button>
  </form>
</main>

<footer>
  <a href="https://github.com/Necrosiak/bc250-toolkit-decky" target="_blank" rel="noopener">BC250 Toolkit on GitHub</a>
  &nbsp;·&nbsp;
  <a href="https://github.com/Necrosiak/bc250-toolkit-decky/blob/main/README.md" target="_blank" rel="noopener" data-i18n="footer_db"></a>
</footer>

const LANG_LABELS = {
  en: "EN 🇬🇧", fr: "FR 🇫🇷", de: "DE 🇩🇪", es: "ES 🇪🇸",
  it: "IT 🇮🇹", pt: "PT 🇵🇹", nl: "NL 🇳🇱", pl: "PL 🇵🇱", ru: "RU 🇷🇺",
};

let currentLang = "en";

function detectLang() {
  const nav = (navigator.language || "en").toLowerCase().slice(0, 2);
  return I18N[nav] ? nav : "en";
}

function applyLang(lang) {
  currentLang = lang;
  const t = I18N[lang];
  document.title = t.page_title;
  document.getElementById("introText").innerHTML = t.intro;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key]) el.innerHTML = t[key];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const key = el.getAttribute("data-i18n-placeholder");
    if (t[key]) el.placeholder = t[key];
  });
  document.querySelectorAll("#langBar button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });
}

function buildLangBar() {
  const bar = document.getElementById("langBar");
  Object.entries(LANG_LABELS).forEach(([code, label]) => {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.dataset.lang = code;
    btn.onclick = () => applyLang(code);
    bar.appendChild(btn);
  });
}

function validate() {
  let ok = true;
  const t = I18N[currentLang];

  const nameEl = document.getElementById("gameName");
  const nameField = document.getElementById("f-name");
  nameField.classList.toggle("invalid", !nameEl.value.trim());
  if (!nameEl.value.trim()) ok = false;

  const appIdEl = document.getElementById("appId");
  const appIdField = document.getElementById("f-appid");
  const appIdError = document.getElementById("appIdError");
  const appIdVal = appIdEl.value.trim();
  if (!appIdVal) {
    appIdField.classList.add("invalid");
    appIdError.textContent = t.err_required;
    ok = false;
  } else if (!/^\d+$/.test(appIdVal)) {
    appIdField.classList.add("invalid");
    appIdError.textContent = t.err_appid;
    ok = false;
  } else {
    appIdField.classList.remove("invalid");
    appIdError.textContent = "";
  }

  const notesEl = document.getElementById("notes");
  const notesField = document.getElementById("f-notes");
  notesField.classList.toggle("invalid", !notesEl.value.trim());
  if (!notesEl.value.trim()) ok = false;

  return ok;
}

document.getElementById("gameForm").addEventListener("submit", function(e) {
  e.preventDefault();
  if (!validate()) return;

  const gameName   = document.getElementById("gameName").value.trim();
  const appId      = document.getElementById("appId").value.trim();
  const proton     = document.getElementById("proton").value;
  const compatTool = document.getElementById("compatTool").value.trim();
  const launchOpts = document.getElementById("launchOpts").value.trim();
  const notes      = document.getElementById("notes").value.trim();
  const testedBy   = document.getElementById("testedBy").value.trim();

  const body = [
    `### Game Name\n\n${gameName}`,
    `### Steam App ID\n\n${appId}`,
    `### Proton Version\n\n${proton}`,
    `### Compat Tool ID (optional)\n\n${compatTool || "_none_"}`,
    `### Launch Options\n\n${launchOpts || "_none_"}`,
    `### Notes\n\n${notes}`,
    `### Tested By\n\n${testedBy || "_anonymous_"}`,
  ].join("\n\n");

  const title = encodeURIComponent(`[Game] ${gameName}`);
  const bodyEnc = encodeURIComponent(body);
  const url = `https://github.com/Necrosiak/bc250-toolkit-decky/issues/new?template=game_request.yml&title=${title}&body=${bodyEnc}`;
  window.open(url, "_blank", "noopener");
});

buildLangBar();
applyLang(detectLang());
</script>
